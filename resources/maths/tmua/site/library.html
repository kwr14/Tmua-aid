<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TMUA Study Atlas · Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="library">
    <div class="site-shell">
      <header class="topbar" id="topbar"></header>

      <main class="page">
        <section class="panel" style="padding: 32px;">
          <span class="eyebrow">Library explorer</span>
          <div class="section-head" style="margin-top: 12px;">
            <div>
              <h2>Study Pack Library</h2>
              <p>Browse the notes, plans, and maps by role in your revision flow.</p>
            </div>
          </div>

          <div class="filter-shell">
            <input id="search" type="search" placeholder="Search by title, tag, or topic" />
            <select id="category" aria-label="Filter by study category">
              <option value="">All categories</option>
              <option value="learn">Learn</option>
              <option value="practice">Practice</option>
              <option value="review">Review</option>
              <option value="simulate">Simulate</option>
            </select>
            <select id="type" aria-label="Filter by resource type">
              <option value="">All types</option>
              <option value="note">Notes</option>
              <option value="plan">Plans</option>
              <option value="map">Maps</option>
              <option value="timetable">Timetable</option>
            </select>
          </div>
        </section>

        <section class="section">
          <div class="resource-grid" id="resource-list"></div>
        </section>

        <footer class="footer-note" id="footer-note"></footer>
      </main>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
